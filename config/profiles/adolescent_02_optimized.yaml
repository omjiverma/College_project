# config/profiles/adolescent_02_optimized.yaml
# Optimized tuning for adolescent_002 with adaptive control enhancements
# Focus: Better TIR, less hypo, less overshoot

# Core insulin settings - slightly adjusted
DIA: 290
basal_nominal: 0.65
basal_max: 1.8

# Carbs / insulin sensitivity
CR: 5.2                  # Slightly more aggressive on carbs
CF_base: 22              # More conservative on corrections
target: 130

max_bolus: 8.5

# Dynamic aggression parameters (improved)
iob_excess_threshold: 1.3
aggression_min: 0.15

# Enhanced PID parameters
Kp: 0.0035               # Slightly higher P gain (more responsive)
Ki: 0.000006             # Higher I gain for better integral action
Kd: 0.012                # Slightly higher D gain for better damping

# PID anti-windup (new)
pid_max_integral: 400.0
pid_trim_rate: 0.08

# Trend estimation (new)
trend_ema_alpha: 0.35    # EMA smoothing for trend (0-1, higher = more responsive)

# Meal-related (new)
meal_detection_threshold: 12.0
detected_meal_default: 25.0

# Hypoglycemia prediction (new)
hypo_horizon: 35         # Minutes to look ahead for hypo prediction

# MPC/HPC settings (optimized)
mpc_enable: true
mpc_horizon: 35          # Slightly longer horizon for better prediction
mpc_immediate_fraction: 0.30  # Deliver more immediately (careful tuning)
mpc_max_bolus: 0.25      # Slightly higher cap
iob_mpc_threshold: 1.8   # More conservative IOB threshold

# Bergman model parameters (patient-specific)
p1: 0.028
p2: 0.025
p3: 0.00005
n: 0.05
Gb: 110
Ib: 15
alpha: 300

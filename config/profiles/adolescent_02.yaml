# ===== STRENGTHENED PID FOR UNPREDICTABILITY =====
Kp: 0.0045            # +50% (more responsive to errors)
Ki: 0.000006          # +50% (better integral correction)
Kd: 0.015             # +50% (catch trends faster)

# ===== CONSERVATIVE BOLUSING (Meal sizes vary!) =====
CR: 5.0               # Down from 5.5 (more insulin per carb)
CF_base: 18           # Down from 20 (more correction)

# ===== STABLE BASELINE (Timing varies!) =====
basal_nominal: 0.68   # Up from 0.60 (+13% stability)

# ===== ADAPTIVE HYPO SAFETY =====
aggression_min: 0.15  # Up from 0.10 (faster hypo reaction)
iob_excess_threshold: 0.8  # Down from 1.0 (tighter IOB control)
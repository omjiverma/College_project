# # adolescent_002.yaml - MINIMAL PROFILE
# # Only required parameters; all others use defaults

# # ===== REQUIRED: PID Tuning =====
# Kp: 0.003
# Ki: 0.000004
# Kd: 0.010

# # ===== REQUIRED: Core Insulin Settings =====
# basal_nominal: 0.60
# CR: 5.5
# CF_base: 20
# target: 130

# # ===== OPTIONAL: Override Defaults =====


DIA: 300

basal_nominal: 0.5      # Typical adult needs 0.5-1.5 U/hr
basal_max: 2.0          # Maximum allowed temporary basal

# Bolus parameters
CR: 20                  # Carb ratio: 10g per 1U
CF_base: 50             # Correction factor: 50 mg/dL per 1U
target: 110             # Target glucose
max_bolus: 15.0         # Max single bolus

# Safety
iob_excess_threshold: 2.0
aggression_min: 0.2

# PID gains (tuned for U/hr and 3-min timesteps)
Kp: 0.005               # Proportional: U/hr per mg/dL error
Ki: 0.000008            # Integral: U/hr per mg/dL·hr
Kd: 0.015               # Derivative: U/hr per mg/dL/hr trend
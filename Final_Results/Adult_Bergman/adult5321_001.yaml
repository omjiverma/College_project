# DIA: 300
# basal_nominal: 0.3
# basal_max: 1.5

# # carbs / insulin sensitivity
# CR: 30                 # grams per unit
# CF_base: 50            # mg/dL per U (approx)
# target: 120
# max_bolus: 15.0

# # controller gains / safety
# iob_excess_threshold: 2.0
# aggression_min: 0.2
# Kp: 0.005
# Ki: 0.000008
# Kd: 0.015

# # MPC / Bergman HPC tuning
# mpc_enable: true
# mpc_horizon: 30                # minutes ahead to predict
# mpc_immediate_fraction: 0.20  # fraction of predicted bolus to deliver now
# mpc_max_bolus: 1.0
# mpc_safety_fraction: 0.25

# # Bergman model nominal parameters (tune per patient)
# p1: 0.028
# p2: 0.025
# p3: 0.00005
# n: 0.05
# Gb: 110
# Ib: 15
# alpha: 300

# # Additional safety for HPC
# iob_mpc_threshold: 3.0
# mpc_hypo_count_threshold: 3
# mpc_hypo_window_min: 120
# mpc_disable_hours: 2


# ===== Basal Profile =====
DIA: 300
basal_nominal: 0.5
basal_max: 2.0

# ===== Sensitivity =====
CR: 18
CF_base: 45
target: 130
max_bolus: 15.0

# ===== PID / Safety =====
iob_excess_threshold: 2.0
aggression_min: 0.25   # slightly higher minimum → improves high BG control
Kp: 0.005
Ki: 0.000008
Kd: 0.015

# ===== MPC / Bergman HPC =====
mpc_enable: true
mpc_horizon: 30
mpc_immediate_fraction: 0.30
mpc_max_bolus: 1.2
mpc_safety_fraction: 0.25
iob_mpc_threshold: 3.5
mpc_hypo_count_threshold: 2
mpc_hypo_window_min: 90
mpc_disable_hours: 1.5

# ===== Bergman Model =====
p1: 0.028
p2: 0.025
p3: 0.00005
n: 0.05
Gb: 110
Ib: 15
alpha: 300

